project:
  name: transcript-pipeline
  version: 0.1.0
  description: test
runtime:
  profile: local_cpu
  environment: test
  log_level: INFO
profiles:
  local_cpu:
    device: cpu
    asr_compute_type: int8
    asr_model_size: small
    batch_size: 1
    beam_size: 5
    temp_dir: /tmp/transcript-pipeline
    cache_dir: ~/.cache/transcript-pipeline
paths:
  videos_dir: /home/kuma/programes/transcript-pipeline/tmp/pdfs/prepare-reference-parity-sample/data/input/videos
  audio_dir: /home/kuma/programes/transcript-pipeline/tmp/pdfs/prepare-reference-parity-sample/data/input/audio
  reference_dir: /home/kuma/programes/transcript-pipeline/tmp/pdfs/prepare-reference-parity-sample/data/input/reference
  asr_dir: /home/kuma/programes/transcript-pipeline/tmp/pdfs/prepare-reference-parity-sample/data/intermediate/asr
  ocr_dir: /home/kuma/programes/transcript-pipeline/tmp/pdfs/prepare-reference-parity-sample/data/intermediate/ocr
  extracted_text_dir: /home/kuma/programes/transcript-pipeline/tmp/pdfs/prepare-reference-parity-sample/data/intermediate/extracted_text
  chunks_dir: /home/kuma/programes/transcript-pipeline/tmp/pdfs/prepare-reference-parity-sample/data/intermediate/chunks
  aligned_dir: /home/kuma/programes/transcript-pipeline/tmp/pdfs/prepare-reference-parity-sample/data/intermediate/aligned
  classified_dir: /home/kuma/programes/transcript-pipeline/tmp/pdfs/prepare-reference-parity-sample/data/intermediate/classified
  refined_dir: /home/kuma/programes/transcript-pipeline/tmp/pdfs/prepare-reference-parity-sample/data/intermediate/refined
  review_dir: /home/kuma/programes/transcript-pipeline/tmp/pdfs/prepare-reference-parity-sample/data/output/review
  final_dir: /home/kuma/programes/transcript-pipeline/tmp/pdfs/prepare-reference-parity-sample/data/output/final
  logs_dir: /home/kuma/programes/transcript-pipeline/tmp/pdfs/prepare-reference-parity-sample/data/output/logs
audio:
  output_format: wav
  sample_rate: 16000
  channels: 1
  overwrite: false
  supported_video_ext:
  - .mp4
  - .mkv
  - .mov
  - .webm
  supported_audio_ext:
  - .wav
  - .mp3
  - .m4a
  - .flac
asr:
  engine: faster-whisper
  language: zh
  beam_size: 5
  vad_filter: true
  condition_on_previous_text: true
  word_timestamps: false
  initial_prompt: ''
  model_cache_subdir: faster-whisper
reference:
  enabled: true
  allow_pdf: true
  allow_txt: true
  allow_md: true
  allow_docx: false
  prefer_existing_text: true
  run_ocr_when_needed: false
  sentence_split_enabled: true
  ai_ocr_backend: codex_api
  gemini_ocr_model: Gemini 3.5 Flash (High)
  gemini_ocr_fallback_model: ''
  codex_ocr_model: gpt-5.6-terra
  codex_ocr_reasoning_effort: high
  codex_ocr_max_concurrency: 40
  codex_ocr_submit_interval_seconds: 5.0
  ocr_timeout_seconds: 480
  ocr_languages:
  - chi_sim
  - eng
segmentation:
  enabled: true
  min_chars_per_block: 60
  max_chars_per_block: 500
  max_seconds_per_block: 30
  split_on_empty_line: true
  merge_short_lines: true
alignment:
  method: rapidfuzz_ratio
  top_k: 3
  matched_threshold: 80
  weak_match_threshold: 55
  use_normalization: true
classification:
  enabled: true
  allow_types:
  - quote
  - lecture
  - qa
  default_type: lecture
  qa_section_title: 提问环节
  enable_intro_candidate: true
  quote_score_threshold: 85
  quote_like_min_score: 40
  mixed_score_threshold: 60
  quote_margin_threshold: 8
  reference_focus_margin: 4
  qa_keywords:
  - 为什么
  - 怎么
  - 请问
  - 是不是
  - 有没有
  - 能不能
  - 如何
  - 哪一个
  intro_keywords:
  - 现在播送
  - 中央人民广播电台
  - 下面播送
  - 标题
  - 作者
  - 今天我们
  - 今天继续
  lecture_markers:
  - 就是说
  - 我们看
  - 你看
  - 意思是
  - 说明
  - 比如
  - 所以
  - 这个地方
  - 这里
llm:
  enabled: true
  provider: local_cli
  model: gpt-5.6
  gemini_model: Gemini 3.1 Pro (High)
  gemini_fallback_model: ''
  backends:
  - codex_api
  enable_fallback: true
  block_batch_size: 2
  block_concurrency: 6
  prompt_style: web_like
  top_matches_for_prompt: 3
  max_asr_chars_for_prompt: 120
  max_reference_chars_for_prompt: 120
  reasoning_effort: high
  temperature: 0.1
  max_output_tokens: 4000
  timeout_seconds: 1800
  safe_replace_min_score: 88.0
  safe_replace_min_margin: 6.0
  safe_replace_length_ratio_min: 0.8
  safe_replace_length_ratio_max: 1.2
  safe_replace_max_extra_content_ratio: 0.12
  safe_replace_min_run_length: 2
codex_lb:
  base_url: http://127.0.0.1:2455
  base_url_env: CODEX_LB_BASE_URL
  api_key_env: CODEX_LB_API_KEY
  responses_path: /v1/responses
  codex_responses_path: /backend-api/codex/responses
  files_create_path: /backend-api/files
  files_finalize_path_template: /backend-api/files/{file_id}/uploaded
prompts:
  classify_and_correct: /home/kuma/programes/transcript-pipeline/tmp/pdfs/prepare-reference-parity-sample/config/prompts/classify_and_correct.md
  final_cleanup: /home/kuma/programes/transcript-pipeline/tmp/pdfs/prepare-reference-parity-sample/config/prompts/final_cleanup.md
  conversation_cleanup: /home/kuma/programes/transcript-pipeline/tmp/pdfs/prepare-reference-parity-sample/config/prompts/conversation_cleanup.md
output:
  write_review_json: true
  write_final_markdown: true
  final_markdown_filename: final.md
  review_json_filename: review.json
  include_timestamps_in_final: false
  include_reference_in_final: false
  include_notes_in_final: false
pipeline:
  stop_on_error: true
  stages:
  - extract_audio
  - transcribe
  - prepare_reference
  - refine
  - export_markdown
