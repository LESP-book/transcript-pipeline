feature: 2026-07-16-prepare-reference-pdf-ocr-parity
created: 2026-07-16

steps:
  - action: "名词与身份契约：建立公共 PDF OCR 运行身份、页级结果和可恢复状态契约"
    exit_signal: "相同输入与 OCR 配置得到相同检查点命名空间，源内容、模型、推理强度或协议版本变化时得到不同命名空间"
    status: done
  - action: "准备参考编排：接入统一缺页调度、页检查点和 partial 结果，并阻断不完整参考文本"
    exit_signal: "中间页失败后其余页继续执行，成功页持久化，准备参考不生成缺页 TXT"
    status: done
  - action: "任务恢复：让单阶段、单任务和批量子任务沿用原运行与工作区补页并在补齐后继续下游"
    exit_signal: "同一运行重试只请求缺失页，服务恢复后不重复成功页，完整任务只在补齐后进入后续阶段"
    status: done
  - action: "请求与命令行契约：统一所有准备参考入口的模型、推理强度、投递间隔和最大并发参数"
    exit_signal: "Web API 与 CLI 均默认使用 5 秒和 40 并发，也能保存并执行本次自定义值"
    status: done
  - action: "Web 交互：同步独立 OCR 的调度设置、页进度、逐页错误和重试缺失页操作"
    exit_signal: "浏览器可配置参数、查看 partial 任务并在原运行上补页，非法输入不会创建任务"
    status: done
  - action: "验证与兼容：补齐自动化测试、真实 PDF 恢复运行、前端构建和浏览器回归"
    exit_signal: "全量 pytest、前端构建、关键验收场景和至少一个真实 PDF 缺页补跑均有通过证据"
    status: done

